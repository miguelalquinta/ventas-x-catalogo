<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Informes{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; } .navbar { background-color: #343a40; } .navbar a { color: white !important; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/informes/">📊 Informes</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/informes/clientes/">Clientes</a>
                <a class="nav-link" href="/informes/productos/">Productos</a>
                <a class="nav-link" href="/informes/ventas/">Ventas</a>
                <a class="nav-link" href="/informes/pagos/">Pagos</a>
                <a class="nav-link" href="/informes/campanas/">Campañas</a>
                <a class="nav-link" href="/informes/deudas/">Deudas</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
