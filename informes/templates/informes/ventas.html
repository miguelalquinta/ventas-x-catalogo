{% extends "informes/base.html" %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h2>🛒 Ventas</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Vendedor</th>
                    <th>Total</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                {% for venta in ventas %}
                <tr>
                    <td>#{{ venta.id }}</td>
                    <td>{{ venta.cliente.nombre }}</td>
                    <td>{{ venta.vendedor.nombre }}</td>
                    <td>${{ venta.total }}</td>
                    <td>{{ venta.fecha|date:"d/m/Y" }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="5" class="text-center text-muted">Sin datos</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
