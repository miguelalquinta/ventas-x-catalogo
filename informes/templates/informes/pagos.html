{% extends "informes/base.html" %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h2>💳 Pagos</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Venta</th>
                    <th>Cliente</th>
                    <th>Monto</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                {% for pago in pagos %}
                <tr>
                    <td>#{{ pago.id }}</td>
                    <td>#{{ pago.venta.id }}</td>
                    <td>{{ pago.venta.cliente.nombre }}</td>
                    <td>${{ pago.monto }}</td>
                    <td>{{ pago.fecha|date:"d/m/Y" }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="5" class="text-center text-muted">Sin datos</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
